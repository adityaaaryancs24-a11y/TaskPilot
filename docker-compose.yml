version: "3.9"

services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taskpilot
      POSTGRES_PASSWORD: taskpilot
      POSTGRES_DB: taskpilot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskpilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── GitHub MCP server (self-hosted, official github/github-mcp-server image) ──
  # No token baked in here — each request carries the per-user OAuth bearer
  # token from core/mcp_client.py, obtained via /auth/github/login.
  github-mcp-server:
    image: ghcr.io/github/github-mcp-server:latest
    command: ["http", "--port", "9090"]
    ports:
      - "9090:9090"
    restart: unless-stopped

  # ── Backend API ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://taskpilot:taskpilot@postgres:5432/taskpilot
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      MCP_GITHUB_URL: http://github-mcp-server:9090/mcp
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      github-mcp-server:
        condition: service_started
    volumes:
      - ./backend:/app
    restart: unless-stopped

  # ── Celery Worker ──
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.celery
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://taskpilot:taskpilot@postgres:5432/taskpilot
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  # ── Celery Beat (scheduled tasks) ──
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.celery
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://taskpilot:taskpilot@postgres:5432/taskpilot
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    command: celery -A celery_app beat --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Monitoring (Prometheus + Grafana) ──
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  grafana_data:
