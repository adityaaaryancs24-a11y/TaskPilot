apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: taskpilot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
        - name: worker
          image: taskpilot/celery-worker:latest
          imagePullPolicy: Always
          command: ["celery", "-A", "celery_app", "worker", "--loglevel=info", "--concurrency=2"]
          envFrom:
            - configMapRef:
                name: taskpilot-config
            - secretRef:
                name: taskpilot-secrets
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: taskpilot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      containers:
        - name: beat
          image: taskpilot/celery-worker:latest
          imagePullPolicy: Always
          command: ["celery", "-A", "celery_app", "beat", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: taskpilot-config
            - secretRef:
                name: taskpilot-secrets
