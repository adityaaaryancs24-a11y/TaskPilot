apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: taskpilot
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: taskpilot
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: taskpilot-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: taskpilot
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "taskpilot"]
            initialDelaySeconds: 5
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: taskpilot
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
